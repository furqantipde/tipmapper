<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>TipMapper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090c;
    --surface: #111117;
    --card: #18181f;
    --card2: #1f1f28;
    --accent: #8b74fa;
    --accent2: #b99dff;
    --accent-glow: rgba(139,116,250,0.18);
    --border: rgba(255,255,255,0.06);
    --border2: rgba(139,116,250,0.22);
    --text: #ede9ff;
    --muted: #6b6880;
    --muted2: #9490a8;
    --user-bub: #241f40;
    --ai-bub: #18181f;
    --danger: #f87171;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* Phone shell */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--surface);
    border-radius: 44px;
    border: 1.5px solid var(--border2);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 40px 120px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Notch */
  .notch {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 32px;
    background: var(--bg);
    border-radius: 20px;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .notch-cam { width: 10px; height: 10px; border-radius: 50%; background: #1a1a22; border: 1.5px solid #2a2a35; }
  .notch-mic { width: 40px; height: 5px; border-radius: 3px; background: #1a1a22; }

  /* Status bar */
  .statusbar {
    padding: 16px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    flex-shrink: 0;
    margin-top: 36px;
  }
  .status-right { display: flex; gap: 8px; align-items: center; }
  .signal { display: flex; gap: 2px; align-items: flex-end; }
  .signal-bar { width: 3px; background: var(--muted2); border-radius: 1px; }
  .signal-bar:nth-child(1){ height: 4px; }
  .signal-bar:nth-child(2){ height: 7px; }
  .signal-bar:nth-child(3){ height: 10px; }
  .signal-bar:nth-child(4){ height: 13px; }
  .battery {
    width: 20px; height: 11px;
    border: 1.5px solid var(--muted2);
    border-radius: 3px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 1.5px;
  }
  .battery::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 5px;
    background: var(--muted2);
    border-radius: 0 1px 1px 0;
  }
  .battery-fill { width: 70%; height: 100%; background: var(--muted2); border-radius: 1.5px; }

  /* Top bar */
  .topbar {
    padding: 10px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: rgba(17,17,23,0.8);
    backdrop-filter: blur(12px);
  }
  .back-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent2);
    font-size: 18px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: var(--accent-glow); }

  .avatar-wrap { position: relative; flex-shrink: 0; }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6d58d4, #a78bfa, #c084fc);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700;
    color: #fff;
    box-shadow: 0 0 0 2px var(--surface), 0 0 0 3.5px var(--accent2);
  }
  .online-dot {
    position: absolute;
    bottom: 1px; right: 1px;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #4ade80;
    border: 2px solid var(--surface);
  }

  .topbar-info { flex: 1; min-width: 0; }
  .topbar-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-sub { font-size: 11px; color: #4ade80; font-family: 'Space Mono', monospace; letter-spacing: 0.04em; }

  .topbar-actions { display: flex; gap: 4px; }
  .tb-btn {
    width: 34px; height: 34px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted2);
    font-size: 15px;
    transition: all 0.15s;
  }
  .tb-btn:hover { background: var(--accent-glow); color: var(--accent2); border-color: var(--border2); }

  /* Chatbox */
  .chatbox {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--card2) transparent;
  }
  .chatbox::-webkit-scrollbar { width: 3px; }
  .chatbox::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 3px; }

  /* Date divider */
  .date-divider {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px; color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .date-divider::before, .date-divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* Message rows */
  .msg-row { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.25s ease; }
  .msg-row.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6d58d4, #a78bfa);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 8px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 76%; }
  .msg-row.user .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text);
    word-break: break-word;
  }
  .bubble.ai {
    background: var(--ai-bub);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
  }
  .bubble.user {
    background: var(--user-bub);
    border: 1px solid rgba(139,116,250,0.2);
    border-radius: 16px 16px 4px 16px;
  }
  .bubble-meta {
    display: flex; align-items: center; gap: 5px;
    margin-top: 4px; padding: 0 2px;
  }
  .bubble-time { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .bubble-tick { font-size: 10px; color: var(--accent2); }

  /* Image card */
  .img-card {
    max-width: 76%; border-radius: 16px;
    overflow: hidden; border: 1px solid var(--border);
    cursor: pointer; position: relative;
    background: var(--card);
    animation: fadeUp 0.25s ease;
  }
  .img-card img { width: 220px; height: 180px; display: block; object-fit: cover; }
  .img-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 10px;
    opacity: 0; transition: opacity 0.2s;
  }
  .img-card:hover .img-overlay { opacity: 1; }
  .img-save-btn {
    background: rgba(139,116,250,0.85);
    border: none; border-radius: 9px;
    color: #fff; font-size: 11px;
    padding: 5px 10px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .img-save-btn:hover { background: var(--accent); }

  /* Typing indicator */
  .typing-row { display: flex; gap: 8px; align-items: flex-end; }
  .typing-bubble {
    background: var(--ai-bub);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    padding: 12px 16px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
    animation: blink 1.2s infinite;
  }
  .typing-dot:nth-child(2){ animation-delay: 0.2s; }
  .typing-dot:nth-child(3){ animation-delay: 0.4s; }
  @keyframes blink { 0%,60%,100%{ opacity:0.3; transform:scale(0.85); } 30%{ opacity:1; transform:scale(1); } }

  /* Quick chips */
  .chips-wrap {
    padding: 8px 16px 0;
    display: flex; gap: 6px;
    overflow-x: auto; scrollbar-width: none;
    flex-shrink: 0;
  }
  .chips-wrap::-webkit-scrollbar { display: none; }
  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px 12px;
    font-size: 11.5px;
    color: var(--muted2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover {
    border-color: var(--border2);
    color: var(--accent2);
    background: var(--accent-glow);
  }

  /* Input area */
  .input-area {
    padding: 10px 16px 20px;
    background: rgba(17,17,23,0.95);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row:focus-within {
    border-color: var(--border2);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .chat-input {
    flex: 1; background: transparent;
    border: none; outline: none;
    font-size: 13.5px; color: var(--text);
    font-family: 'DM Sans', sans-serif;
    resize: none; min-height: 22px; max-height: 88px;
    line-height: 1.5;
  }
  .chat-input::placeholder { color: var(--muted); }
  .input-btns { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .img-cmd-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted2);
    font-size: 11px;
    padding: 5px 8px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.15s;
  }
  .img-cmd-btn:hover { background: var(--accent-glow); color: var(--accent2); border-color: var(--border2); }
  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%; border: none;
    background: linear-gradient(135deg, #7c6dfa, #b99dff);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(139,116,250,0.35);
    transition: opacity 0.15s, transform 0.1s;
  }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 15px; height: 15px; fill: #fff; }

  /* Fullscreen image overlay */
  .fs-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; padding: 24px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .fs-overlay img {
    max-width: 100%; max-height: 75vh;
    border-radius: 16px; object-fit: contain;
    box-shadow: 0 20px 80px rgba(0,0,0,0.7);
  }
  .fs-actions { display: flex; gap: 12px; margin-top: 20px; }
  .fs-btn {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 12px;
    color: var(--text);
    font-size: 13px;
    padding: 9px 20px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .fs-btn:hover { background: var(--accent-glow); color: var(--accent2); }
  .fs-btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .fs-btn.primary:hover { background: var(--accent2); }
  .fs-close {
    position: absolute; top: 20px; right: 20px;
    width: 36px; height: 36px;
    border-radius: 50%; background: var(--card);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted2); font-size: 16px;
    transition: all 0.15s;
  }
  .fs-close:hover { background: var(--accent-glow); color: var(--danger); }

  /* Error bubble */
  .bubble.error { border-color: rgba(248,113,113,0.3); color: var(--danger); font-size: 13px; }
</style>
</head>
<body>

<div class="phone">

  <!-- Notch -->
  <div class="notch">
    <div class="notch-mic"></div>
    <div class="notch-cam"></div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span id="clock">9:41</span>
    <div class="status-right">
      <div class="signal">
        <div class="signal-bar"></div>
        <div class="signal-bar"></div>
        <div class="signal-bar"></div>
        <div class="signal-bar"></div>
      </div>
      <span>WiFi</span>
      <div class="battery"><div class="battery-fill"></div></div>
    </div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="back-btn">&#8249;</div>
    <div class="avatar-wrap">
      <div class="avatar">TM</div>
      <div class="online-dot"></div>
    </div>
    <div class="topbar-info">
      <div class="topbar-name">TipMapper</div>
      <div class="topbar-sub">● online</div>
    </div>
    <div class="topbar-actions">
      <div class="tb-btn" title="Search">⌕</div>
      <div class="tb-btn" title="More">⋯</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chatbox" id="chatbox">
    <div class="date-divider">Today</div>
    <div class="msg-row">
      <div class="msg-avatar">TM</div>
      <div class="bubble-wrap">
        <div class="bubble ai">Hey! I'm TipMapper ✦<br>Chat with me naturally — or use <b>/image</b> followed by a description to generate images.</div>
        <div class="bubble-meta"><span class="bubble-time" id="init-time"></span></div>
      </div>
    </div>
  </div>

  <!-- Quick chips -->
  <div class="chips-wrap">
    <div class="chip" onclick="quickSend('Tell me a fun fact')">✦ fun fact</div>
    <div class="chip" onclick="quickSend('/image a glowing galaxy purple nebula')">🌌 galaxy</div>
    <div class="chip" onclick="quickSend('Write me a short poem')">✍ poem</div>
    <div class="chip" onclick="quickSend('/image neon cyberpunk city rain night')">🌆 neon city</div>
    <div class="chip" onclick="quickSend('/image a cute cat in a space suit')">🐱 space cat</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="Message or /image ..." rows="1"></textarea>
      <div class="input-btns">
        <button class="img-cmd-btn" onclick="insertImageCmd()">/img</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  const LLM_API = 'https://backend.buildpicoapps.com/aero/run/llm-api?pk=v1-Z0FBQUFBQnA5RW5qMHBPR0syNW9SVlBJbkdrZFZ1UE9PRE1RX1FEeXREMDlzUUZIZGdZZDMxWU1JVm52dzk4R1lETjh6bjY3el9VMmxvd1h3VWc2Z0Jod2RHZEZybk05LVE9PQ==';
  const IMG_API = 'https://backend.buildpicoapps.com/aero/run/image-generation-api?pk=v1-Z0FBQUFBQnA5RW5qMHBPR0syNW9SVlBJbkdrZFZ1UE9PRE1RX1FEeXREMDlzUUZIZGdZZDMxWU1JVm52dzk4R1lETjh6bjY3el9VMmxvd1h3VWc2Z0Jod2RHZEZybk05LVE9PQ==';

  const chatbox = document.getElementById('chatbox');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }
  updateClock(); setInterval(updateClock, 30000);
  document.getElementById('init-time').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  // Auto-grow textarea
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 88) + 'px';
  });
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function getTime() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function scrollBottom() {
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  function addUserBubble(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    const bub = document.createElement('div');
    bub.className = 'bubble user';
    bub.textContent = text;
    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    meta.innerHTML = `<span class="bubble-time">${getTime()}</span><span class="bubble-tick">✓✓</span>`;
    wrap.appendChild(bub); wrap.appendChild(meta);
    row.appendChild(wrap);
    chatbox.appendChild(row);
    scrollBottom();
  }

  function addAIBubble(text, isError=false) {
    const row = document.createElement('div');
    row.className = 'msg-row';
    const av = document.createElement('div');
    av.className = 'msg-avatar'; av.textContent = 'TM';
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    const bub = document.createElement('div');
    bub.className = 'bubble ai' + (isError ? ' error' : '');
    bub.textContent = text;
    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    meta.innerHTML = `<span class="bubble-time">${getTime()}</span>`;
    wrap.appendChild(bub); wrap.appendChild(meta);
    row.appendChild(av); row.appendChild(wrap);
    chatbox.appendChild(row);
    scrollBottom();
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'typing-row'; row.id = 'typing-row';
    const av = document.createElement('div');
    av.className = 'msg-avatar'; av.textContent = 'TM';
    const bub = document.createElement('div');
    bub.className = 'typing-bubble';
    bub.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    row.appendChild(av); row.appendChild(bub);
    chatbox.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function addImageMsg(url) {
    const row = document.createElement('div');
    row.className = 'msg-row';
    const av = document.createElement('div');
    av.className = 'msg-avatar'; av.textContent = 'TM';
    const card = document.createElement('div');
    card.className = 'img-card';
    const img = document.createElement('img');
    img.src = url; img.alt = 'Generated image';
    const ov = document.createElement('div');
    ov.className = 'img-overlay';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'img-save-btn'; saveBtn.textContent = 'Save';
    saveBtn.onclick = (e) => { e.stopPropagation(); downloadImage(url); };
    ov.appendChild(saveBtn);
    card.appendChild(img); card.appendChild(ov);
    card.onclick = () => showFullscreen(url);
    row.appendChild(av); row.appendChild(card);
    chatbox.appendChild(row);
    scrollBottom();
  }

  function showFullscreen(url) {
    const ov = document.createElement('div');
    ov.className = 'fs-overlay';
    ov.onclick = (e) => { if(e.target===ov) ov.remove(); };
    const img = document.createElement('img');
    img.src = url;
    const cl = document.createElement('div');
    cl.className = 'fs-close'; cl.innerHTML = '✕';
    cl.onclick = () => ov.remove();
    const actions = document.createElement('div');
    actions.className = 'fs-actions';
    const dlBtn = document.createElement('button');
    dlBtn.className = 'fs-btn primary'; dlBtn.textContent = 'Download';
    dlBtn.onclick = () => downloadImage(url);
    const closeBtn = document.createElement('button');
    closeBtn.className = 'fs-btn'; closeBtn.textContent = 'Close';
    closeBtn.onclick = () => ov.remove();
    actions.appendChild(dlBtn); actions.appendChild(closeBtn);
    ov.appendChild(cl); ov.appendChild(img); ov.appendChild(actions);
    document.body.appendChild(ov);
  }

  function downloadImage(url) {
    const a = document.createElement('a');
    a.href = url; a.download = 'tipmapper-image.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  function setLoading(on) {
    chatInput.disabled = on;
    sendBtn.disabled = on;
    if (!on) { chatInput.focus(); chatInput.style.height = 'auto'; }
  }

  async function callApi(url, prompt) {
    const res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt})
    });
    return res.json();
  }

  async function sendMessage() {
    const msg = chatInput.value.trim();
    if (!msg) return;
    chatInput.value = '';
    addUserBubble(msg);
    setLoading(true);
    addTyping();

    try {
      if (/^\/(image|img)\s+/i.test(msg)) {
        const desc = msg.replace(/^\/(image|img)\s+/i, '');
        const data = await callApi(IMG_API, desc);
        removeTyping();
        if (data.status === 'success') addImageMsg(data.imageUrl);
        else addAIBubble('Could not generate image. Please try again.', true);
      } else {
        const persona = "Follow instructions precisely! If the user asks to generate, create or make an image, photo, or picture by describing it, You will reply with '/image' + description. Otherwise, You will respond normally. Avoid additional explanations. ";
        const data = await callApi(LLM_API, persona + msg);
        removeTyping();
        if (data.status === 'success') {
          const text = data.text.trim();
          if (text.toLowerCase().startsWith('/image')) {
            const desc = text.substring(text.toLowerCase().indexOf('/image') + 6).trim();
            addTyping();
            const imgData = await callApi(IMG_API, desc);
            removeTyping();
            if (imgData.status === 'success') addImageMsg(imgData.imageUrl);
            else addAIBubble('Image generation failed.', true);
          } else {
            addAIBubble(text);
          }
        } else {
          addAIBubble('Something went wrong. Please try again.', true);
        }
      }
    } catch(e) {
      removeTyping();
      addAIBubble('Network error. Please check your connection.', true);
    }

    setLoading(false);
  }

  function quickSend(text) {
    chatInput.value = text;
    sendMessage();
  }

  function insertImageCmd() {
    chatInput.value = '/image ';
    chatInput.focus();
  }
</script>
</body>
</html>
